<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Immich Picker</title>
  <link rel="stylesheet" href="picker.css" />
</head>
<body>
  <header class="hdr">
    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="recent" role="tab">Recent</button>
      <button class="tab" data-tab="search" role="tab">Search</button>
      <button class="tab" data-tab="albums" role="tab">Albums</button>
    </div>
    <button class="close-btn" id="close" title="Close">×</button>
  </header>

  <section class="toolbar" id="toolbar">
    <input type="search" id="search-input" placeholder="Search photos (people, places, things, dates)…" autocomplete="off" />
    <button id="search-btn">Search</button>
  </section>

  <section class="album-search" id="album-search" hidden>
    <input type="search" id="album-filter" placeholder="Filter albums…" autocomplete="off" spellcheck="false" />
  </section>

  <section class="album-list" id="album-list" hidden></section>

  <section class="grid-wrap">
    <div class="grid" id="grid"></div>
    <div class="status empty" id="empty" hidden>
      <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <path d="m21 15-5-5L5 21" />
      </svg>
      <div class="status-text">No photos found</div>
    </div>
    <div class="status loading" id="loading" hidden>
      <span class="spinner" aria-hidden="true"></span>
      <div class="status-text">Loading…</div>
    </div>
    <div class="status error" id="error" hidden></div>
    <div class="sentinel" id="sentinel"></div>
  </section>

  <footer class="ftr">
    <button id="cancel">Cancel</button>
    <label class="opt" title="Downscale longest side to 1920px (if larger) and re-encode as JPEG q=0.9, which also drops EXIF / GPS / camera metadata.">
      <input type="checkbox" id="opt-shrink" />
      <span>Resize to 1080p &amp; strip metadata</span>
    </label>
    <span class="spacer"></span>
    <a class="kofi-link" href="https://ko-fi.com/richard1912" target="_blank" rel="noopener" title="Like this? Buy me a coffee on Ko-fi">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M17 8h1a4 4 0 0 1 0 8h-1"/>
        <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
        <line x1="6" y1="2" x2="6" y2="4"/>
        <line x1="10" y1="2" x2="10" y2="4"/>
        <line x1="14" y1="2" x2="14" y2="4"/>
      </svg>
    </a>
    <span class="version" id="version" title="Extension version"></span>
    <span class="count" id="count">0 selected</span>
    <button id="attach" class="primary" disabled>Attach</button>
  </footer>

  <script src="picker.js"></script>
</body>
</html>
